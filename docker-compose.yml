services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-mssql
    environment:
      SA_PASSWORD: "TaskManager_2024!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "TaskManager_2024!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./TaskManagerAPI
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "3001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=TaskManagerDb;User Id=sa;Password=TaskManager_2024!;TrustServerCertificate=True;
    depends_on:
      mssql:
        condition: service_healthy

  frontend:
    build:
      context: ./TaskManager.React
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mssql_data:
